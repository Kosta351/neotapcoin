<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NeoTapCoin RU</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #f3ba2f;
            --bg: #050505;
            --card: #111;
            --bronze: #cd7f32;
            --silver: #c0c0c0;
            --platinum: #e5e4e2;
            --diamond: #b9f2ff;
        }

        body {
            background: var(--bg);
            color: #fff;
            font-family: 'Inter', sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            user-select: none;
        }

        .nav { position: fixed; bottom: 15px; left: 5%; width: 90%; background: rgba(15,15,15,0.9); backdrop-filter: blur(10px); border-radius: 20px; display: grid; grid-template-columns: repeat(4, 1fr); padding: 12px 0; border: 1px solid #222; z-index: 1000; }
        .nav-item { display: flex; flex-direction: column; align-items: center; font-size: 11px; color: #666; cursor: pointer; font-weight: 600; }
        .nav-item.active { color: var(--gold); }
        .nav-item span { font-size: 18px; margin-bottom: 2px; }

        .page { display: none; flex-direction: column; align-items: center; width: 100%; height: 100%; overflow-y: auto; padding-bottom: 120px; }
        .active { display: flex; }

        /* Шапка */
        .header { margin-top: 30px; text-align: center; width: 100%; }
        #league-name { font-size: 14px; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 5px; }
        #balance { font-size: 48px; font-weight: 900; color: var(--gold); }

        /* Монета */
        .coin-section { position: relative; margin-top: 40px; }
        .coin { width: 280px; height: 280px; background: url('coin.png') no-repeat center; background-size: contain; transition: transform 0.1s; cursor: pointer; }
        
        /* Эффект Турбо */
        .turbo-mode .coin { filter: drop-shadow(0 0 40px #ff4500); animation: pulse-turbo 0.3s infinite; }
        @keyframes pulse-turbo { 0% {transform: scale(1);} 50% {transform: scale(1.05);} 100% {transform: scale(1);} }

        .turbo-timer { position: absolute; top: -30px; left: 50%; transform: translateX(-50%); color: #ff4500; font-weight: 900; font-size: 20px; display: none; }
        .turbo-mode .turbo-timer { display: block; }

        /* Карточки магазина */
        .card-list { width: 92%; margin-top: 15px; }
        .card { background: var(--card); border-radius: 18px; padding: 18px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #222; }
        .card-info { text-align: left; }
        .card-title { font-weight: 700; font-size: 16px; color: #eee; }
        .card-price { color: var(--gold); font-weight: 900; font-size: 14px; margin-top: 5px; }
        .buy-btn { background: var(--gold); border: none; border-radius: 10px; padding: 10px 18px; font-weight: 800; cursor: pointer; font-size: 13px; }
        .buy-btn:disabled { background: #333; color: #666; }

        /* Спец-карточка Турбо в магазине */
        .turbo-card { background: linear-gradient(135deg, #441100 0%, #111 100%); border: 1px solid #ff4500; }
        .turbo-card .buy-btn { background: #ff4500; color: #fff; }

        /* Ежедневные награды */
        .daily-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; width: 90%; margin-top: 20px; }
        .daily-day { background: #111; border: 1px solid #222; padding: 10px; border-radius: 12px; font-size: 11px; text-align: center; color: #666; }
        .daily-day.current { border-color: var(--gold); background: rgba(243, 186, 47, 0.1); color: #fff; }

        .tap-anim { position: absolute; color: #fff; font-weight: 900; font-size: 34px; pointer-events: none; animation: float 0.8s ease-out forwards; z-index: 100; text-shadow: 0 0 10px rgba(255,69,0,0.5); }
        @keyframes float { 0% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-120px); } }
    </style>
</head>
<body>

    <!-- ЭКРАН ИГРЫ -->
    <div id="game" class="page active">
        <div class="header">
            <div id="league-name">Бронзовая лига</div>
            <div id="balance">0</div>
            <div style="color: #666; font-size: 13px; font-weight: 700; margin-top: 5px;">Прибыль: +<span id="p-income">0</span> / сек</div>
        </div>

        <div class="coin-section">
            <div class="turbo-timer" id="t-timer">15с</div>
            <div class="coin" id="coin-btn"></div>
        </div>

        <div style="width: 85%; margin-top: auto; margin-bottom: 30px;">
            <div style="height: 10px; background: #222; border-radius: 10px; overflow: hidden; border: 1px solid #333;">
                <div id="energy-fill" style="width: 100%; height: 100%; background: var(--gold); transition: 0.2s;"></div>
            </div>
            <div style="display:flex; justify-content: space-between; margin-top:10px; font-size:14px; font-weight:800; color:#aaa;">
                <span>⚡️ <span id="e-val">1000</span> / 1000</span>
                <span id="multitap-info">Тап x1</span>
            </div>
        </div>
    </div>

    <!-- ЭКРАН МАГАЗИНА -->
    <div id="shop" class="page">
        <h2 style="margin-top:40px;">Улучшения</h2>
        
        <div class="card-list">
            <!-- БУСТЕР ТУРБО -->
            <div class="card turbo-card">
                <div class="card-info">
                    <div class="card-title">🔥 ТУРБО-РЕЖИМ</div>
                    <div class="card-subtitle" style="font-size:12px; color:#aaa;">Тап x5 и бесконечная энергия</div>
                    <div class="card-price" id="turbo-left">Доступно: 3 / 3</div>
                </div>
                <button class="buy-btn" id="start-turbo-btn" onclick="activateTurbo()">ИСПОЛЬЗОВАТЬ</button>
            </div>

            <!-- ПРЕДМЕТЫ МАГАЗИНА -->
            <div id="shop-items-container"></div>
        </div>
    </div>

    <!-- ЭКРАН ЗАДАНИЙ -->
    <div id="tasks" class="page">
        <h2 style="margin-top:40px;">Задания</h2>
        <div class="daily-grid" id="daily-rewards"></div>
        <button class="buy-btn" style="width: 90%; margin-top: 20px; padding: 15px;" onclick="claimDaily()">ЗАБРАТЬ ЕЖЕДНЕВНЫЙ БОНУС</button>
        
        <div class="card-list" style="margin-top:30px;">
            <div class="card">
                <div class="card-info">
                    <div class="card-title">Подписка на канал</div>
                    <div class="card-price">+10,000 монета</div>
                </div>
                <button class="buy-btn" onclick="this.disabled=true; addCoins(10000)">ПРОВЕРИТЬ</button>
            </div>
        </div>
    </div>

    <!-- ЭКРАН ДРУЗЕЙ -->
    <div id="friends" class="page">
        <h2 style="margin-top:40px;">Твоя сеть</h2>
        <div style="background:#111; padding:30px; border-radius:24px; width:80%; border:1px solid #222; text-align:center;">
            <h3>Зови друзей!</h3>
            <p style="color:#666; font-size:14px; line-height: 1.5;">Получай 15,000 за каждого активного майнера в твоей команде.</p>
            <button class="buy-btn" style="width:100%; padding:15px; margin-top:10px;" onclick="copyLink()">КОПИРОВАТЬ ССЫЛКУ</button>
        </div>
    </div>

    <!-- МЕНЮ -->
    <div class="nav">
        <div class="nav-item active" onclick="showPage('game')"><span>🎮</span>Игра</div>
        <div class="nav-item" onclick="showPage('shop')"><span>🏦</span>Магазин</div>
        <div class="nav-item" onclick="showPage('tasks')"><span>📅</span>Заработок</div>
        <div class="nav-item" onclick="showPage('friends')"><span>👥</span>Друзья</div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        let state = {
            coins: Number(localStorage.getItem('n_coins')) || 0,
            energy: Number(localStorage.getItem('n_energy')) || 1000,
            tapLvl: Number(localStorage.getItem('n_tapLvl')) || 1,
            mineLvl: Number(localStorage.getItem('n_mineLvl')) || 0,
            turbo: Number(localStorage.getItem('n_turbo_left')) || 3,
            isTurbo: false,
            lastDaily: localStorage.getItem('n_lastDaily') || '',
            streak: Number(localStorage.getItem('n_streak')) || 0
        };

        const LEAGUES = [
            { name: "Бронзовая", min: 0, color: "#cd7f32" },
            { name: "Серебряная", min: 50000, color: "#c0c0c0" },
            { name: "Золотая", min: 250000, color: "#f3ba2f" },
            { name: "Платиновая", min: 1000000, color: "#e5e4e2" },
            { name: "Бриллиантовая", min: 5000000, color: "#b9f2ff" }
        ];

        const SHOP_ITEMS = [
            { id: 'tap', name: 'Мульти-Тап', basePrice: 500, ratio: 2.8 },
            { id: 'srv', name: 'Нео-Сервер', basePrice: 5000, income: 1, ratio: 1.9 },
            { id: 'node', name: 'Квантовый Узел', basePrice: 100000, income: 15, ratio: 2.1 },
            { id: 'ai', name: 'Нейроядро ИИ', basePrice: 1500000, income: 200, ratio: 2.4 }
        ];

        function updateUI() {
            document.getElementById('balance').innerText = Math.floor(state.coins).toLocaleString();
            document.getElementById('e-val').innerText = Math.floor(state.energy);
            document.getElementById('energy-fill').style.width = (state.energy / 10) + '%';
            document.getElementById('p-income').innerText = state.mineLvl;
            document.getElementById('multitap-info').innerText = 'Тап x' + (state.isTurbo ? state.tapLvl * 5 : state.tapLvl);
            document.getElementById('turbo-left').innerText = `Доступно: ${state.turbo} / 3`;
            
            if (state.turbo <= 0) document.getElementById('start-turbo-btn').disabled = true;

            let league = [...LEAGUES].reverse().find(l => state.coins >= l.min);
            let lEl = document.getElementById('league-name');
            lEl.innerText = league.name + ' лига';
            lEl.style.color = league.color;

            renderShop();
            renderDaily();
        }

        function renderShop() {
            let html = '';
            SHOP_ITEMS.forEach(item => {
                let lvl = item.id === 'tap' ? state.tapLvl - 1 : (item.id === 'srv' ? state.mineLvl : 0); // Упрощенный расчет
                let price = Math.floor(item.basePrice * Math.pow(item.ratio, lvl));
                html += `<div class="card">
                    <div class="card-info">
                        <div class="card-title">${item.name}</div>
                        <div class="card-price">💰 ${price.toLocaleString()}</div>
                    </div>
                    <button class="buy-btn" onclick="buy('${item.id}', ${price})">КУПИТЬ</button>
                </div>`;
            });
            document.getElementById('shop-items-container').innerHTML = html;
        }

        function renderDaily() {
            let html = '';
            for(let i=1; i<=8; i++) {
                let activeClass = state.streak + 1 === i ? 'current' : '';
                html += `<div class="daily-day ${activeClass}">День ${i}<br><b>${i*1000}</b></div>`;
            }
            document.getElementById('daily-rewards').innerHTML = html;
        }

        function handleTap(e) {
            let power = state.isTurbo ? state.tapLvl * 5 : state.tapLvl;
            if (state.energy >= state.tapLvl || state.isTurbo) {
                state.coins += power;
                if (!state.isTurbo) state.energy -= state.tapLvl;

                const x = e.type.includes('mouse') ? e.clientX : e.touches[0].clientX;
                const y = e.type.includes('mouse') ? e.clientY : e.touches[0].clientY;
                showTapAnim(x, y, '+' + power);
                
                tg.HapticFeedback.impactOccurred('medium');
                save(); updateUI();
            }
        }

        function activateTurbo() {
            if (state.turbo > 0 && !state.isTurbo) {
                state.turbo--;
                state.isTurbo = true;
                
                showPage('game'); // Перекидываем на игру
                document.body.classList.add('turbo-mode');
                
                let timeLeft = 15;
                document.getElementById('t-timer').innerText = timeLeft + 'с';
                
                let interval = setInterval(() => {
                    timeLeft--;
                    document.getElementById('t-timer').innerText = timeLeft + 'с';
                    if (timeLeft <= 0) {
                        clearInterval(interval);
                        state.isTurbo = false;
                        document.body.classList.remove('turbo-mode');
                        save();
                        showPage('shop'); // Кидаем обратно в магазин
                        updateUI();
                    }
                }, 1000);
                
                save();
                updateUI();
            }
        }

        function buy(id, price) {
            if (state.coins >= price) {
                state.coins -= price;
                if (id === 'tap') state.tapLvl++;
                if (id === 'srv') state.mineLvl += 1;
                if (id === 'node') state.mineLvl += 15;
                if (id === 'ai') state.mineLvl += 200;
                save(); updateUI();
            }
        }

        function addCoins(num) {
            state.coins += num; save(); updateUI();
            alert('Монеты начислены!');
        }

        function claimDaily() {
            let today = new Date().toDateString();
            if (state.lastDaily !== today) {
                state.streak++;
                state.coins += state.streak * 1000;
                state.lastDaily = today;
                save(); updateUI();
                alert('Награда за вход получена!');
            } else {
                alert('Приходи завтра за новой наградой!');
            }
        }

        function showTapAnim(x, y, txt) {
            let div = document.createElement('div');
            div.className = 'tap-anim';
            div.innerText = txt;
            div.style.left = x + 'px';
            div.style.top = y + 'px';
            document.body.appendChild(div);
            setTimeout(() => div.remove(), 800);
        }

        function showPage(pId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(pId).classList.add('active');
            
            // Находим нужный айтем меню по тексту (для автоматического переключения)
            let items = document.querySelectorAll('.nav-item');
            if (pId === 'game') items[0].classList.add('active');
            if (pId === 'shop') items[1].classList.add('active');
            if (pId === 'tasks') items[2].classList.add('active');
            if (pId === 'friends') items[3].classList.add('active');
        }

        function save() {
            localStorage.setItem('n_coins', state.coins);
            localStorage.setItem('n_energy', state.energy);
            localStorage.setItem('n_tapLvl', state.tapLvl);
            localStorage.setItem('n_mineLvl', state.mineLvl);
            localStorage.setItem('n_streak', state.streak);
            localStorage.setItem('n_lastDaily', state.lastDaily);
            localStorage.setItem('n_turbo_left', state.turbo);
        }

        const cBtn = document.getElementById('coin-btn');
        cBtn.addEventListener('touchstart', (e) => { e.preventDefault(); handleTap(e); });
        cBtn.addEventListener('mousedown', handleTap);
        window.addEventListener('mouseup', () => cBtn.style.transform = 'scale(1)');
        window.addEventListener('touchend', () => cBtn.style.transform = 'scale(1)');

        setInterval(() => {
            state.coins += state.mineLvl / 10;
            if (state.energy < 1000) state.energy = Math.min(1000, state.energy + 0.6);
            updateUI();
        }, 100);

        updateUI();
    </script>
</body>
</html>
