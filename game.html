<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NeoTapCoin Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #f3ba2f;
            --bg: #050505;
            --card: #111;
            --bronze: #cd7f32;
            --silver: #c0c0c0;
            --platinum: #e5e4e2;
            --diamond: #b9f2ff;
        }

        body {
            background: var(--bg);
            color: #fff;
            font-family: 'Inter', sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            user-select: none;
        }

        /* Навигация */
        .nav { position: fixed; bottom: 15px; left: 5%; width: 90%; background: rgba(15,15,15,0.9); backdrop-filter: blur(10px); border-radius: 20px; display: grid; grid-template-columns: repeat(4, 1fr); padding: 12px 0; border: 1px solid #222; z-index: 1000; }
        .nav-item { display: flex; flex-direction: column; align-items: center; font-size: 10px; color: #666; cursor: pointer; }
        .nav-item.active { color: var(--gold); }

        .page { display: none; flex-direction: column; align-items: center; width: 100%; height: 100%; overflow-y: auto; padding-bottom: 120px; }
        .active { display: flex; }

        /* Шапка и Лиги */
        .header { margin-top: 30px; text-align: center; width: 100%; }
        #league-name { font-size: 14px; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 5px; }
        #balance { font-size: 48px; font-weight: 900; color: var(--gold); }

        /* Монета */
        .coin-section { position: relative; margin-top: 20px; }
        .coin { width: 260px; height: 260px; background: url('coin.png') no-repeat center; background-size: contain; transition: transform 0.1s; cursor: pointer; }
        .turbo-mode .coin { filter: drop-shadow(0 0 30px #ff4500); animation: shake 0.2s infinite; }
        @keyframes shake { 0% {transform: scale(0.95);} 50% {transform: scale(1.02);} 100% {transform: scale(0.95);} }

        /* Бустер кнопка */
        .boost-btn { margin-top: 20px; background: linear-gradient(45deg, #ff4500, #ff8c00); border: none; border-radius: 12px; padding: 10px 25px; color: #fff; font-weight: 900; cursor: pointer; display: flex; align-items: center; gap: 8px; }
        .boost-btn:disabled { background: #333; opacity: 0.5; }

        /* Списки карточек */
        .card-list { width: 92%; margin-top: 20px; }
        .card { background: var(--card); border-radius: 18px; padding: 18px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #222; }
        .card-info { text-align: left; }
        .card-title { font-weight: 700; font-size: 16px; }
        .card-price { color: var(--gold); font-weight: 900; font-size: 14px; margin-top: 5px; }
        .buy-btn { background: var(--gold); border: none; border-radius: 10px; padding: 8px 15px; font-weight: 800; cursor: pointer; }

        /* Ежедневный бонус */
        .daily-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; width: 90%; margin-top: 20px; }
        .daily-day { background: #111; border: 1px solid #222; padding: 10px; border-radius: 10px; font-size: 12px; }
        .daily-day.current { border-color: var(--gold); background: rgba(243, 186, 47, 0.1); }

        .tap-anim { position: absolute; color: #fff; font-weight: 900; font-size: 30px; pointer-events: none; animation: float 0.7s ease-out forwards; z-index: 100; }
        @keyframes float { 0% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-100px); } }
    </style>
</head>
<body>

    <!-- ИГРА -->
    <div id="game" class="page active">
        <div class="header">
            <div id="league-name" style="color: var(--bronze);">Bronze League</div>
            <div id="balance">0</div>
            <div style="color: #666; font-size: 12px; font-weight: 700;">+<span id="p-income">0</span> / sec</div>
        </div>

        <div class="coin-section" id="coin-area">
            <div class="coin" id="coin-btn"></div>
        </div>

        <button class="boost-btn" id="turbo-btn" onclick="activateTurbo()">
            🔥 TURBO <span id="turbo-count">3/3</span>
        </button>

        <div style="width: 85%; margin-top: auto; margin-bottom: 20px;">
            <div style="height: 8px; background: #222; border-radius: 10px; overflow: hidden; border: 1px solid #333;">
                <div id="energy-fill" style="width: 100%; height: 100%; background: var(--gold); transition: 0.3s;"></div>
            </div>
            <div style="display:flex; justify-content: space-between; margin-top:8px; font-size:12px; font-weight:800; color:#888;">
                <span>⚡️ <span id="e-val">1000</span> / 1000</span>
                <span id="multitap-info">Tap x1</span>
            </div>
        </div>
    </div>

    <!-- МАГАЗИН -->
    <div id="shop" class="page">
        <h2 style="margin-top:40px;">Hardware Store</h2>
        <div class="card-list" id="shop-items"></div>
    </div>

    <!-- ЗАДАНИЯ -->
    <div id="tasks" class="page">
        <h2 style="margin-top:40px;">Daily Tasks</h2>
        <div class="daily-grid" id="daily-rewards"></div>
        <button class="boost-btn" id="claim-daily" style="width: 90%; margin-top: 15px;" onclick="claimDaily()">Забрать награду</button>
        
        <div class="card-list" style="margin-top:30px;">
            <div class="card">
                <div class="card-info">
                    <div class="card-title">Join Community</div>
                    <div class="card-price">+10,000</div>
                </div>
                <button class="buy-btn" onclick="this.disabled=true; addCoins(10000)">Check</button>
            </div>
        </div>
    </div>

    <!-- ДРУЗЬЯ -->
    <div id="friends" class="page">
        <h2 style="margin-top:40px;">Network</h2>
        <div style="background:#111; padding:30px; border-radius:20px; width:80%; border:1px solid #222; text-align:center;">
            <h3>Invite & Earn</h3>
            <p style="color:#666; font-size:14px;">Get 15,000 for each active miner</p>
            <button class="buy-btn" style="width:100%; padding:15px;" onclick="copyLink()">COPY LINK</button>
        </div>
    </div>

    <div class="nav">
        <div class="nav-item active" onclick="showPage('game')">🎮<span>Game</span></div>
        <div class="nav-item" onclick="showPage('shop')">🏦<span>Shop</span></div>
        <div class="nav-item" onclick="showPage('tasks')">📅<span>Earn</span></div>
        <div class="nav-item" onclick="showPage('friends')">👥<span>Ref</span></div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        let state = {
            coins: Number(localStorage.getItem('n_coins')) || 0,
            energy: Number(localStorage.getItem('n_energy')) || 1000,
            tapLvl: Number(localStorage.getItem('n_tapLvl')) || 1,
            mineLvl: Number(localStorage.getItem('n_mineLvl')) || 0,
            turbo: 3,
            isTurbo: false,
            lastDaily: localStorage.getItem('n_lastDaily') || '',
            streak: Number(localStorage.getItem('n_streak')) || 0
        };

        const LEAGUES = [
            { name: "Bronze", min: 0, color: "#cd7f32" },
            { name: "Silver", min: 50000, color: "#c0c0c0" },
            { name: "Gold", min: 250000, color: "#f3ba2f" },
            { name: "Platinum", min: 1000000, color: "#e5e4e2" },
            { name: "Diamond", min: 5000000, color: "#b9f2ff" }
        ];

        const SHOP_ITEMS = [
            { id: 'tap', name: 'Multi-Tap', basePrice: 500, ratio: 2.5 },
            { id: 'srv', name: 'Neo-Server', basePrice: 5000, income: 1, ratio: 1.8 },
            { id: 'node', name: 'Quantum Node', basePrice: 75000, income: 15, ratio: 2.0 },
            { id: 'ai', name: 'AI Neural Core', basePrice: 1000000, income: 150, ratio: 2.2 }
        ];

        function updateUI() {
            document.getElementById('balance').innerText = Math.floor(state.coins).toLocaleString();
            document.getElementById('e-val').innerText = Math.floor(state.energy);
            document.getElementById('energy-fill').style.width = (state.energy / 10) + '%';
            document.getElementById('p-income').innerText = state.mineLvl;
            document.getElementById('multitap-info').innerText = 'Tap x' + (state.isTurbo ? state.tapLvl * 5 : state.tapLvl);
            document.getElementById('turbo-count').innerText = state.turbo + '/3';

            // Лига
            let league = [...LEAGUES].reverse().find(l => state.coins >= l.min);
            let lEl = document.getElementById('league-name');
            lEl.innerText = league.name + ' League';
            lEl.style.color = league.color;

            renderShop();
            renderDaily();
        }

        function renderShop() {
            let html = '';
            SHOP_ITEMS.forEach(item => {
                let lvl = item.id === 'tap' ? state.tapLvl - 1 : (item.id === 'srv' ? state.mineLvl : 0); // Упрощенно
                let price = Math.floor(item.basePrice * Math.pow(item.ratio, lvl));
                html += `<div class="card">
                    <div class="card-info">
                        <div class="card-title">${item.name}</div>
                        <div class="card-price">💰 ${price.toLocaleString()}</div>
                    </div>
                    <button class="buy-btn" onclick="buy('${item.id}', ${price})">BUY</button>
                </div>`;
            });
            document.getElementById('shop-items').innerHTML = html;
        }

        function renderDaily() {
            let html = '';
            for(let i=1; i<=8; i++) {
                let current = state.streak + 1 === i ? 'current' : '';
                html += `<div class="daily-day ${current}">Day ${i}<br><b>${i*1000}</b></div>`;
            }
            document.getElementById('daily-rewards').innerHTML = html;
        }

        function handleTap(e) {
            let power = state.isTurbo ? state.tapLvl * 5 : state.tapLvl;
            if (state.energy >= state.tapLvl || state.isTurbo) {
                state.coins += power;
                if (!state.isTurbo) state.energy -= state.tapLvl;

                const x = e.type.includes('mouse') ? e.clientX : e.touches[0].clientX;
                const y = e.type.includes('mouse') ? e.clientY : e.touches[0].clientY;
                showTapAnim(x, y, '+' + power);
                
                tg.HapticFeedback.impactOccurred('light');
                save(); updateUI();
            }
        }

        function activateTurbo() {
            if (state.turbo > 0 && !state.isTurbo) {
                state.turbo--;
                state.isTurbo = true;
                document.body.classList.add('turbo-mode');
                setTimeout(() => {
                    state.isTurbo = false;
                    document.body.classList.remove('turbo-mode');
                    updateUI();
                }, 15000);
                updateUI();
            }
        }

        function buy(id, price) {
            if (state.coins >= price) {
                state.coins -= price;
                if (id === 'tap') state.tapLvl++;
                if (id === 'srv') state.mineLvl += 1;
                if (id === 'node') state.mineLvl += 15;
                if (id === 'ai') state.mineLvl += 150;
                save(); updateUI();
            }
        }

        function claimDaily() {
            let today = new Date().toDateString();
            if (state.lastDaily !== today) {
                state.streak++;
                state.coins += state.streak * 1000;
                state.lastDaily = today;
                save(); updateUI();
                alert('Награда получена!');
            } else {
                alert('Приходи завтра!');
            }
        }

        function showTapAnim(x, y, txt) {
            let div = document.createElement('div');
            div.className = 'tap-anim';
            div.innerText = txt;
            div.style.left = x + 'px';
            div.style.top = y + 'px';
            document.body.appendChild(div);
            setTimeout(() => div.remove(), 700);
        }

        function showPage(p) {
            document.querySelectorAll('.page').forEach(pg => pg.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(ni => ni.classList.remove('active'));
            document.getElementById(p).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        function save() {
            localStorage.setItem('n_coins', state.coins);
            localStorage.setItem('n_energy', state.energy);
            localStorage.setItem('n_tapLvl', state.tapLvl);
            localStorage.setItem('n_mineLvl', state.mineLvl);
            localStorage.setItem('n_streak', state.streak);
            localStorage.setItem('n_lastDaily', state.lastDaily);
        }

        document.getElementById('coin-btn').addEventListener('touchstart', (e) => { e.preventDefault(); handleTap(e); });
        document.getElementById('coin-btn').addEventListener('mousedown', handleTap);

        setInterval(() => {
            state.coins += state.mineLvl / 10;
            if (state.energy < 1000) state.energy = Math.min(1000, state.energy + 0.5);
            updateUI();
        }, 100);

        updateUI();
    </script>
</body>
</html>
