<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NeoTapCoin</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            background-color: #000;
            color: #fff;
            font-family: 'Arial', sans-serif;
            text-align: center;
            margin: 0;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        #balance {
            font-size: 42px;
            margin-bottom: 20px;
            font-weight: bold;
            color: #ffd700;
        }

        .coin-container {
            position: relative;
            cursor: pointer;
            transition: transform 0.1s;
        }

        .coin-container:active {
            transform: scale(0.95);
        }

        /* Здесь будет твоя монета N */
        .coin {
            width: 250px;
            height: 250px;
            background: url('ТВОЯ_ССЫЛКА_НА_ИЗОБРАЖЕНИЕ_N_МОНЕТЫ') no-repeat center;
            background-size: contain;
            border-radius: 50%;
            box-shadow: 0 0 50px rgba(255, 215, 0, 0.3);
        }

        .energy-bar {
            width: 80%;
            height: 10px;
            background: #333;
            border-radius: 5px;
            margin-top: 30px;
        }

        .energy-fill {
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, #ffd700, #ff8c00);
            border-radius: 5px;
        }
    </style>
</head>
<body>

    <div id="balance">0</div>
    
    <div class="coin-container" onclick="handleTap(event)">
        <div class="coin"></div>
    </div>

    <div class="energy-bar">
        <div id="energy" class="energy-fill"></div>
    </div>
    <p>Energy: <span id="energy-text">1000</span>/1000</p>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand(); // Разворачиваем на весь экран

        let coins = 0;
        let energy = 1000;

        function handleTap(event) {
            if (energy > 0) {
                coins += 1;
                energy -= 1;
                updateUI();
                
                // Вибрация (только на телефонах)
                tg.HapticFeedback.impactOccurred('medium');
            }
        }

        function updateUI() {
            document.getElementById('balance').innerText = coins;
            document.getElementById('energy-text').innerText = energy;
            document.getElementById('energy').style.width = (energy / 10) + '%';
        }
    </script>
</body>
</html>
