<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NeoTapCoin Premium</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #f3ba2f; --bg: #050505; --card: #111; }
        body { background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; user-select: none; }

        .nav { position: fixed; bottom: 15px; left: 2.5%; width: 95%; background: rgba(15,15,15,0.9); backdrop-filter: blur(10px); border-radius: 20px; display: grid; grid-template-columns: repeat(5, 1fr); padding: 12px 0; border: 1px solid #222; z-index: 1000; }
        .nav-item { display: flex; flex-direction: column; align-items: center; font-size: 10px; color: #666; cursor: pointer; font-weight: 600; }
        .nav-item.active { color: var(--gold); }
        .nav-item span { font-size: 18px; margin-bottom: 2px; }

        .page { display: none; flex-direction: column; align-items: center; width: 100%; height: 100%; overflow-y: auto; padding-bottom: 120px; }
        .active { display: flex; }

        .header { margin-top: 30px; text-align: center; width: 100%; }
        #balance { font-size: 44px; font-weight: 900; color: var(--gold); text-shadow: 0 0 20px rgba(243, 186, 47, 0.4); }

        .coin-section { position: relative; margin-top: 30px; }
        .coin { width: 260px; height: 260px; background: url('coin.png') no-repeat center; background-size: contain; transition: transform 0.1s; cursor: pointer; }
        .turbo-mode .coin { filter: drop-shadow(0 0 40px #ff4500); animation: pulse 0.3s infinite; }
        @keyframes pulse { 0%{transform:scale(1)} 50%{transform:scale(1.05)} 100%{transform:scale(1)} }
        
        .list-container { width: 92%; margin-top: 15px; }
        .card { background: var(--card); border-radius: 18px; padding: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #222; }
        .info-btn { background: #222; color: var(--gold); border: 1px solid #333; width: 24px; height: 24px; border-radius: 50%; font-weight: 900; cursor: pointer; margin-right: 10px;}
        
        .buy-btn { background: var(--gold); border: none; border-radius: 10px; padding: 10px 15px; font-weight: 800; cursor: pointer; }
        #custom-alert { position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-100px); background: #1a1a1a; border: 1px solid var(--gold); color: #fff; padding: 12px 20px; border-radius: 12px; z-index: 2000; transition: 0.4s; font-weight: 700; }
        #custom-alert.show { transform: translateX(-50%) translateY(0); }

        #desc-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 3000; display: none; align-items: center; justify-content: center; }
        .modal-content { background: #151515; width: 75%; padding: 25px; border-radius: 25px; border: 1px solid #333; text-align: center; }

        .tap-anim { position: absolute; color: #fff; font-weight: 900; font-size: 32px; pointer-events: none; animation: float 0.7s forwards; z-index: 100; }
        @keyframes float { 0% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-100px); } }
    </style>
</head>
<body>

    <div id="custom-alert">Сообщение</div>
    <div id="desc-modal" onclick="this.style.display='none'"><div class="modal-content"><h3 id="m-title"></h3><p id="m-text"></p></div></div>

    <!-- ИГРА -->
    <div id="game" class="page active">
        <div class="header">
            <div id="l-name" style="font-weight: 800; color: #cd7f32; text-transform: uppercase;">Бронзовая лига</div>
            <div id="balance">0</div>
            <div style="color: #666; font-size: 13px;">Прибыль: +<span id="p-inc">0</span> / сек</div>
        </div>
        <div class="coin-section">
            <div id="t-timer" style="position: absolute; top: -30px; left: 45%; color: #ff4500; font-weight: 900; display: none;">15с</div>
            <div class="coin" id="coin-btn"></div>
        </div>
        <div style="width: 85%; margin-top: auto; margin-bottom: 30px;">
            <div style="height: 10px; background: #222; border-radius: 10px; overflow: hidden;"><div id="e-fill" style="width: 100%; height: 100%; background: var(--gold);"></div></div>
            <div style="display:flex; justify-content: space-between; margin-top:8px; font-size:13px; font-weight:800; color:#888;">
                <span>⚡️ <span id="e-val">1000</span> / 1000</span>
                <span id="tap-info">Тап x1</span>
            </div>
        </div>
    </div>

    <!-- ТОП -->
    <div id="top" class="page">
        <h2 style="margin-top:40px;">Лидеры NeoTap</h2>
        <div id="top-list" class="list-container"></div>
    </div>

    <!-- МАГАЗИН -->
    <div id="shop" class="page">
        <h2 style="margin-top:40px;">Магазин</h2>
        <div class="list-container">
            <div class="card" style="border-color: #ff4500;">
                <div style="text-align: left;"><div style="font-weight:700;">🔥 ТУРБО-РЕЖИМ</div><div id="t-left" style="color:var(--gold); font-size:12px;">Зарядов: 3</div></div>
                <button class="buy-btn" onclick="activateTurbo()" style="background:#ff4500; color:#fff">ПУСК</button>
            </div>
            <div id="shop-items"></div>
        </div>
    </div>

    <!-- ДРУЗЬЯ -->
    <div id="friends" class="page">
        <h2 style="margin-top:40px;">Твоя команда</h2>
        <button class="buy-btn" style="width:90%; padding:15px;" onclick="copyLink()">ПРИГЛАСИТЬ ДРУГА</button>
        <div id="friends-list" class="list-container"></div>
    </div>

    <div class="nav">
        <div class="nav-item active" onclick="showPage('game')"><span>🎮</span>Игра</div>
        <div class="nav-item" onclick="showPage('top')"><span>🏆</span>Топ</div>
        <div class="nav-item" onclick="showPage('shop')"><span>🏦</span>Рынок</div>
        <div class="nav-item" onclick="showPage('friends')"><span>👥</span>Друзья</div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        const USER_ID = tg.initDataUnsafe.user ? tg.initDataUnsafe.user.id : 123;
        const API_URL = "https://nonprovincial-ireland-rubrically.ngrok-free.dev";

        let state = { coins: 0, energy: 1000, tapLvl: 1, mineLvl: 0, turbo: 3, isTurbo: false };

        const SHOP = [
            { id: 'tap', name: 'Нейрочип Клик', price: 1000, ratio: 3, desc: 'Увеличивает силу тапа.' },
            { id: 'srv', name: 'Дата-центр', price: 10000, inc: 1, ratio: 2, desc: 'Авто-добыча монет каждую секунду.' },
            { id: 'node', name: 'Квантовый Узел', price: 150000, inc: 20, ratio: 2.2, desc: 'Мощная станция для майнинга.' }
        ];

        async function loadData() {
            try {
                let r = await fetch(`${API_URL}/get_user/${USER_ID}`);
                let d = await r.json();
                if(!d.error) { state.coins = d.coins; state.tapLvl = d.tapLvl; state.mineLvl = d.mineLvl; state.energy = d.energy; }
                updateUI();
            } catch(e) { showAlert("Ошибка связи с сервером"); }
        }

        async function sync() {
            try { await fetch(`${API_URL}/update_user/${USER_ID}`, {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({coins: state.coins, tapLvl: state.tapLvl, mineLvl: state.mineLvl, energy: state.energy})
            }); } catch(e) {}
        }

        function updateUI() {
            document.getElementById('balance').innerText = Math.floor(state.coins).toLocaleString();
            document.getElementById('e-val').innerText = Math.floor(state.energy);
            document.getElementById('e-fill').style.width = (state.energy / 10) + '%';
            document.getElementById('p-inc').innerText = state.mineLvl;
            document.getElementById('tap-info').innerText = 'Тап x' + (state.isTurbo ? state.tapLvl * 5 : state.tapLvl);
            document.getElementById('t-left').innerText = `Зарядов: ${state.turbo}`;
            renderShop();
        }

        function renderShop() {
            let h = '';
            SHOP.forEach(i => {
                let lvl = i.id === 'tap' ? state.tapLvl - 1 : (i.id === 'srv' ? state.mineLvl : 0);
                let p = Math.floor(i.price * Math.pow(i.ratio, lvl));
                h += `<div class="card"><div style="display:flex; align-items:center;">
                    <button class="info-btn" onclick="showInfo('${i.id}')">?</button>
                    <div style="text-align:left;"><div style="font-weight:700;">${i.name}</div><div style="color:var(--gold); font-weight:900;">💰 ${p.toLocaleString()}</div></div>
                </div><button class="buy-btn" onclick="buy('${i.id}', ${p})">КУПИТЬ</button></div>`;
            });
            document.getElementById('shop-items').innerHTML = h;
        }

        function handleTap(e) {
            let pwr = state.isTurbo ? state.tapLvl * 5 : state.tapLvl;
            if(state.energy >= state.tapLvl || state.isTurbo) {
                state.coins += pwr; if(!state.isTurbo) state.energy -= state.tapLvl;
                let x = e.type.includes('mouse') ? e.clientX : e.touches[0].clientX;
                let y = e.type.includes('mouse') ? e.clientY : e.touches[0].clientY;
                showAnim(x, y, '+' + pwr); updateUI();
                tg.HapticFeedback.impactOccurred('medium');
            }
        }

        function buy(id, p) {
            if(state.coins >= p) {
                state.coins -= p;
                if(id === 'tap') state.tapLvl++;
                if(id === 'srv') state.mineLvl += 1;
                if(id === 'node') state.mineLvl += 20;
                updateUI(); sync();
            } else { showAlert("Недостаточно монет!"); }
        }

        function activateTurbo() {
            if(state.turbo > 0 && !state.isTurbo) {
                state.turbo--; state.isTurbo = true;
                showPage('game'); document.body.classList.add('turbo-mode');
                document.getElementById('t-timer').style.display = 'block';
                let tl = 15;
                let int = setInterval(() => {
                    tl--; document.getElementById('t-timer').innerText = tl + 'с';
                    if(tl <= 0) { clearInterval(int); state.isTurbo = false; document.body.classList.remove('turbo-mode'); document.getElementById('t-timer').style.display = 'none'; showPage('shop'); }
                }, 1000);
            }
        }

        async function showPage(p) {
            document.querySelectorAll('.page').forEach(pg => pg.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(p).classList.add('active');
            if(p === 'top') {
                let r = await fetch(`${API_URL}/get_top`);
                let top = await r.json();
                document.getElementById('top-list').innerHTML = top.map((u, i) => `<div class="card"><b>${i+1}. ${u.username}</b> <span>${Math.floor(u.coins).toLocaleString()}</span></div>`).join('');
            }
            if(p === 'friends') {
                let r = await fetch(`${API_URL}/get_friends/${USER_ID}`);
                let f = await r.json();
                document.getElementById('friends-list').innerHTML = f.map(u => `<div class="card"><b>${u.username}</b> <span>${Math.floor(u.coins).toLocaleString()}</span></div>`).join('') || "Пока никого нет";
            }
        }

        function showInfo(id) {
            let i = SHOP.find(x => x.id === id);
            document.getElementById('m-title').innerText = i.name;
            document.getElementById('m-text').innerText = i.desc;
            document.getElementById('desc-modal').style.display = 'flex';
        }

        function showAlert(t) {
            let a = document.getElementById('custom-alert'); a.innerText = t; a.classList.add('show');
            setTimeout(() => a.classList.remove('show'), 2000);
        }

        function showAnim(x, y, t) {
            let d = document.createElement('div'); d.className = 'tap-anim'; d.innerText = t;
            d.style.left = x + 'px'; d.style.top = y + 'px';
            document.body.appendChild(d); setTimeout(() => d.remove(), 700);
        }

        function copyLink() {
            navigator.clipboard.writeText(`https://t.me/NeoTapCoin_bot?start=${USER_ID}`);
            showAlert("Ссылка скопирована!");
        }

        setInterval(() => {
            if(state.energy < 1000) state.energy = Math.min(1000, state.energy + 1);
            state.coins += state.mineLvl;
            updateUI();
        }, 1000);

        setInterval(sync, 5000);

        const btn = document.getElementById('coin-btn');
        btn.addEventListener('touchstart', (e) => { e.preventDefault(); handleTap(e); });
        btn.addEventListener('mousedown', handleTap);

        loadData();
    </script>
</body>
</html>
