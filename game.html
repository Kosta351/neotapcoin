<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NeoTapCoin Premium</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --main-gold: #f3ba2f;
            --dark-bg: #050505;
        }

        body {
            background-color: var(--dark-bg);
            color: #fff;
            font-family: 'Inter', sans-serif;
            text-align: center;
            margin: 0;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            user-select: none;
            touch-action: manipulation;
            background: radial-gradient(circle at center, #1a1a1a 0%, #050505 100%);
        }

        #balance-container {
            margin-top: 60px;
            font-size: 56px;
            font-weight: 900;
            color: var(--main-gold);
            text-shadow: 0 0 30px rgba(243, 186, 47, 0.3);
            letter-spacing: -1px;
        }

        .coin-wrapper {
            position: relative;
            margin-top: 40px;
            perspective: 1000px;
        }

        .coin-container {
            position: relative;
            cursor: pointer;
            transition: transform 0.1s ease;
            -webkit-tap-highlight-color: transparent;
            z-index: 2;
            display: inline-block;
        }

        .coin {
            width: 280px;
            height: 280px;
            background: url('coin.png') no-repeat center;
            background-size: contain;
            border-radius: 50%; 
            filter: drop-shadow(0 0 50px rgba(243, 186, 47, 0.2));
            pointer-events: none; /* Чтобы не мешала кликам */
        }

        .coin-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 250px;
            height: 250px;
            background: var(--main-gold);
            filter: blur(80px);
            opacity: 0.15;
            z-index: 1;
            pointer-events: none;
        }

        .stats {
            margin-top: auto;
            margin-bottom: 50px;
            width: 85%;
        }

        .energy-bar {
            width: 100%;
            height: 14px;
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .energy-fill {
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, #f3ba2f, #ffdc2a);
            box-shadow: 0 0 15px var(--main-gold);
            transition: width 0.3s ease-out;
        }

        .energy-info {
            display: flex;
            justify-content: space-between;
            margin-top: 12px;
            font-size: 16px;
            font-weight: 700;
            color: #888;
        }

        .tap-number {
            position: absolute;
            color: #fff;
            font-size: 38px;
            font-weight: 900;
            pointer-events: none;
            animation: moveUp 0.8s ease-out forwards;
            z-index: 10;
            text-shadow: 0 0 10px rgba(243, 186, 47, 1);
        }

        @keyframes moveUp {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-150px) scale(1.2); opacity: 0; }
        }
    </style>
</head>
<body>

    <div id="balance-container">0</div>
    
    <div class="coin-wrapper">
        <div class="coin-glow"></div>
        <div class="coin-container" id="coin-btn">
            <div class="coin"></div>
        </div>
    </div>

    <div class="stats">
        <div class="energy-bar">
            <div id="energy" class="energy-fill"></div>
        </div>
        <div class="energy-info">
            <span>⚡️ Энергия</span>
            <span><span id="energy-value">1000</span> / 1000</span>
        </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        let coins = Number(localStorage.getItem('coins')) || 0;
        let energy = Number(localStorage.getItem('energy')) || 1000;
        const coinBtn = document.getElementById('coin-btn');
        const balanceEl = document.getElementById('balance-container');

        function updateUI() {
            balanceEl.innerText = coins.toLocaleString();
            document.getElementById('energy-value').innerText = Math.floor(energy);
            document.getElementById('energy').style.width = (energy / 10) + '%';
        }

        updateUI();

        // Универсальная функция обработки нажатия
        function handleTap(e) {
            if (energy >= 1) {
                coins += 1;
                energy -= 1;
                
                localStorage.setItem('coins', coins);
                localStorage.setItem('energy', energy);

                // Координаты для анимации (мышь или тач)
                const clientX = e.type.includes('mouse') ? e.clientX : e.touches[0].clientX;
                const clientY = e.type.includes('mouse') ? e.clientY : e.touches[0].clientY;

                // 3D эффект наклона
                const rect = coinBtn.getBoundingClientRect();
                const x = clientX - rect.left - rect.width / 2;
                const y = clientY - rect.top - rect.height / 2;
                coinBtn.style.transform = `perspective(1000px) rotateX(${-y/5}deg) rotateY(${x/5}deg) scale(0.95)`;

                createTapNumber(clientX, clientY);
                updateUI();
                
                if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
            }
        }

        // Слушаем и мышку, и касания
        coinBtn.addEventListener('mousedown', handleTap);
        coinBtn.addEventListener('touchstart', (e) => {
            e.preventDefault(); // Защита от мультитача
            handleTap(e);
        });

        // Возвращаем монету в исходное положение
        const resetStyles = () => {
            coinBtn.style.transform = 'perspective(1000px) rotateX(0) rotateY(0) scale(1)';
        };
        coinBtn.addEventListener('mouseup', resetStyles);
        coinBtn.addEventListener('mouseleave', resetStyles);
        coinBtn.addEventListener('touchend', resetStyles);

        function createTapNumber(x, y) {
            const num = document.createElement('div');
            num.className = 'tap-number';
            num.innerText = '+1';
            num.style.left = (x - 20) + 'px';
            num.style.top = (y - 40) + 'px';
            document.body.appendChild(num);
            setTimeout(() => num.remove(), 800);
        }

        // Регенерация энергии
        setInterval(() => {
            if (energy < 1000) {
                energy = Math.min(1000, energy + 1);
                updateUI();
            }
        }, 1000);
    </script>
</body>
</html>
