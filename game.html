<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NeoTapCoin Game</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --main-gold: #f3ba2f;
            --dark-bg: #050505;
            --card-bg: #111111;
        }

        body {
            background-color: var(--dark-bg);
            color: #fff;
            font-family: 'Inter', sans-serif;
            margin: 0;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
            user-select: none;
            background: radial-gradient(circle at center, #1a1a1a 0%, #050505 100%);
        }

        /* Страницы */
        .page { display: none; flex-direction: column; align-items: center; width: 100%; height: 100%; }
        .active { display: flex; }

        /* Шапка */
        .header { margin-top: 40px; text-align: center; }
        #balance { font-size: 52px; font-weight: 900; color: var(--main-gold); text-shadow: 0 0 20px rgba(243, 186, 47, 0.4); }
        .income-info { font-size: 14px; color: #888; margin-top: 5px; }

        /* Игровая зона */
        .coin-wrapper { position: relative; margin-top: 30px; perspective: 1000px; }
        .coin-container { cursor: pointer; transition: transform 0.1s; z-index: 2; position: relative; }
        .coin { width: 280px; height: 280px; background: url('coin.png') no-repeat center; background-size: contain; pointer-events: none; }
        .coin-glow { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 200px; height: 200px; background: var(--main-gold); filter: blur(70px); opacity: 0.1; pointer-events: none; }

        /* Статистика внизу */
        .stats-container { margin-top: auto; margin-bottom: 100px; width: 85%; }
        .energy-bar { width: 100%; height: 12px; background: rgba(255,255,255,0.05); border-radius: 10px; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); }
        .energy-fill { width: 100%; height: 100%; background: linear-gradient(90deg, #f3ba2f, #ff8c00); box-shadow: 0 0 10px var(--main-gold); transition: width 0.3s; }

        /* Магазин */
        .shop-list { width: 90%; margin-top: 20px; overflow-y: auto; padding-bottom: 120px; }
        .upgrade-card { background: var(--card-bg); border: 1px solid #222; border-radius: 16px; padding: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; transition: 0.2s; }
        .upgrade-card:active { background: #1a1a1a; transform: scale(0.98); }
        .upgrade-info { text-align: left; }
        .upgrade-name { font-weight: 700; font-size: 16px; margin-bottom: 4px; }
        .upgrade-desc { font-size: 12px; color: #666; }
        .upgrade-price { font-weight: 900; color: var(--main-gold); margin-top: 5px; }
        .btn-buy { background: var(--main-gold); color: #000; border: none; border-radius: 8px; padding: 8px 15px; font-weight: 700; font-size: 14px; }

        /* Навигация */
        .nav-bar { position: fixed; bottom: 20px; width: 90%; background: rgba(20,20,20,0.9); backdrop-filter: blur(10px); border-radius: 20px; display: flex; justify-content: space-around; padding: 15px 0; border: 1px solid #333; z-index: 100; }
        .nav-item { color: #666; font-weight: 700; font-size: 14px; cursor: pointer; }
        .nav-item.active { color: var(--main-gold); }

        .tap-number { position: absolute; color: #fff; font-size: 32px; font-weight: 900; pointer-events: none; animation: moveUp 0.8s ease-out forwards; text-shadow: 0 0 10px var(--main-gold); }
        @keyframes moveUp { 0% { transform: translateY(0); opacity: 1; } 100% { transform: translateY(-120px); opacity: 0; } }
    </style>
</head>
<body>

    <!-- Страница Игры -->
    <div id="game-page" class="page active">
        <div class="header">
            <div id="balance">0</div>
            <div class="income-info">Прибыль в сек: +<span id="p-income">0</span></div>
        </div>

        <div class="coin-wrapper">
            <div class="coin-glow"></div>
            <div class="coin-container" id="coin-btn">
                <div class="coin"></div>
            </div>
        </div>

        <div class="stats-container">
            <div class="energy-bar"><div id="energy" class="energy-fill"></div></div>
            <div style="display:flex; justify-content: space-between; margin-top:10px; font-weight:700; color:#888;">
                <span>⚡️ <span id="e-val">1000</span>/1000</span>
                <span>NeoTap</span>
            </div>
        </div>
    </div>

    <!-- Страница Магазина -->
    <div id="shop-page" class="page">
        <h2 style="margin-top:40px;">Улучшения</h2>
        <div class="shop-list">
            <div class="upgrade-card" onclick="buyUpgrade('tap')">
                <div class="upgrade-info">
                    <div class="upgrade-name">Multi-Tap</div>
                    <div class="upgrade-desc">Увеличивает доход за один клик</div>
                    <div class="upgrade-price">💰 <span id="price-tap">100</span></div>
                </div>
                <button class="btn-buy">Купить</button>
            </div>

            <div class="upgrade-card" onclick="buyUpgrade('mine')">
                <div class="upgrade-info">
                    <div class="upgrade-name">Neo-Server</div>
                    <div class="upgrade-desc">Приносит +1 монету в секунду</div>
                    <div class="upgrade-price">💰 <span id="price-mine">500</span></div>
                </div>
                <button class="btn-buy">Купить</button>
            </div>
        </div>
    </div>

    <!-- Навигация -->
    <div class="nav-bar">
        <div class="nav-item active" onclick="showPage('game')">ИГРА</div>
        <div class="nav-item" onclick="showPage('shop')">МАГАЗИН</div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        // Состояние игры
        let state = {
            coins: Number(localStorage.getItem('coins')) || 0,
            energy: Number(localStorage.getItem('energy')) || 1000,
            tapLevel: Number(localStorage.getItem('tapLevel')) || 1,
            mineLevel: Number(localStorage.getItem('mineLevel')) || 0
        };

        function updateUI() {
            document.getElementById('balance').innerText = Math.floor(state.coins).toLocaleString();
            document.getElementById('e-val').innerText = Math.floor(state.energy);
            document.getElementById('energy').style.width = (state.energy / 10) + '%';
            document.getElementById('p-income').innerText = state.mineLevel;
            document.getElementById('price-tap').innerText = (state.tapLevel * 100);
            document.getElementById('price-mine').innerText = ((state.mineLevel + 1) * 500);
        }

        function showPage(page) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            document.getElementById(page + '-page').classList.add('active');
            event.currentTarget.classList.add('active');
        }

        const coinBtn = document.getElementById('coin-btn');
        function handleTap(e) {
            if (state.energy >= state.tapLevel) {
                state.coins += state.tapLevel;
                state.energy -= state.tapLevel;
                
                const clientX = e.type.includes('mouse') ? e.clientX : e.touches[0].clientX;
                const clientY = e.type.includes('mouse') ? e.clientY : e.touches[0].clientY;

                createTapNumber(clientX, clientY, '+' + state.tapLevel);
                
                // Эффект наклона
                const rect = coinBtn.getBoundingClientRect();
                const x = clientX - rect.left - rect.width / 2;
                const y = clientY - rect.top - rect.height / 2;
                coinBtn.style.transform = `perspective(1000px) rotateX(${-y/10}deg) rotateY(${x/10}deg) scale(0.96)`;
                
                saveData();
                updateUI();
                tg.HapticFeedback.impactOccurred('medium');
            }
        }

        function buyUpgrade(type) {
            if (type === 'tap') {
                let price = state.tapLevel * 100;
                if (state.coins >= price) {
                    state.coins -= price;
                    state.tapLevel++;
                }
            } else if (type === 'mine') {
                let price = (state.mineLevel + 1) * 500;
                if (state.coins >= price) {
                    state.coins -= price;
                    state.mineLevel++;
                }
            }
            saveData();
            updateUI();
        }

        function createTapNumber(x, y, text) {
            const num = document.createElement('div');
            num.className = 'tap-number';
            num.innerText = text;
            num.style.left = x + 'px';
            num.style.top = y + 'px';
            document.body.appendChild(num);
            setTimeout(() => num.remove(), 800);
        }

        function saveData() {
            localStorage.setItem('coins', state.coins);
            localStorage.setItem('energy', state.energy);
            localStorage.setItem('tapLevel', state.tapLevel);
            localStorage.setItem('mineLevel', state.mineLevel);
        }

        coinBtn.addEventListener('mousedown', handleTap);
        coinBtn.addEventListener('touchstart', (e) => { e.preventDefault(); handleTap(e); });
        window.addEventListener('mouseup', () => coinBtn.style.transform = 'scale(1)');
        window.addEventListener('touchend', () => coinBtn.style.transform = 'scale(1)');

        // Цикл пассивного дохода и регенерации
        setInterval(() => {
            state.coins += state.mineLevel / 10; // Доход каждые 100мс
            if (state.energy < 1000) state.energy = Math.min(1000, state.energy + 0.2);
            updateUI();
            if (state.mineLevel > 0) saveData();
        }, 100);

        updateUI();
    </script>
</body>
</html>
