<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NeoTapCoin Ultimate Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #f3ba2f; --bg: #050505; --card: #111; --bronze: #cd7f32; --silver: #c0c0c0; --platinum: #e5e4e2; --diamond: #b9f2ff; }
        body { background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; user-select: none; touch-action: manipulation; }

        /* Навигация */
        .nav { position: fixed; bottom: 15px; left: 2.5%; width: 95%; background: rgba(15,15,15,0.95); backdrop-filter: blur(10px); border-radius: 20px; display: grid; grid-template-columns: repeat(5, 1fr); padding: 12px 0; border: 1px solid #222; z-index: 1000; }
        .nav-item { display: flex; flex-direction: column; align-items: center; font-size: 10px; color: #666; cursor: pointer; font-weight: 600; }
        .nav-item.active { color: var(--gold); }
        .nav-item span { font-size: 18px; margin-bottom: 2px; }

        .page { display: none; flex-direction: column; align-items: center; width: 100%; height: 100%; overflow-y: auto; padding-bottom: 120px; }
        .active { display: flex; }

        /* Шапка */
        .header { margin-top: 30px; text-align: center; width: 100%; }
        #league-name { font-size: 14px; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; }
        #balance { font-size: 48px; font-weight: 900; color: var(--gold); text-shadow: 0 0 20px rgba(243, 186, 47, 0.4); margin: 5px 0; }

        /* Монета */
        .coin-section { position: relative; margin-top: 20px; perspective: 1000px; }
        .coin { width: 270px; height: 270px; background: url('coin.png') no-repeat center; background-size: contain; transition: transform 0.1s; cursor: pointer; border-radius: 50%; }
        
        .turbo-mode .coin { filter: drop-shadow(0 0 40px #ff4500); animation: pulse-turbo 0.3s infinite; }
        @keyframes pulse-turbo { 0% {transform: scale(1);} 50% {transform: scale(1.04);} 100% {transform: scale(1);} }
        .turbo-timer { position: absolute; top: -30px; left: 50%; transform: translateX(-50%); color: #ff4500; font-weight: 900; font-size: 22px; display: none; text-shadow: 0 0 10px #000; }
        .turbo-mode .turbo-timer { display: block; }

        /* Карточки рынка */
        .card-list { width: 92%; margin-top: 15px; }
        .card { background: var(--card); border-radius: 18px; padding: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #222; }
        .card-info { text-align: left; display: flex; align-items: center; gap: 10px; }
        .info-btn { background: #222; color: var(--gold); border: 1px solid #333; width: 24px; height: 24px; border-radius: 50%; font-weight: 900; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .buy-btn { background: var(--gold); border: none; border-radius: 10px; padding: 10px 18px; font-weight: 800; cursor: pointer; font-size: 13px; }
        .buy-btn:disabled { background: #333; color: #666; }

        /* Задания */
        .daily-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; width: 92%; margin-top: 10px; }
        .daily-day { background: #111; border: 1px solid #222; padding: 10px; border-radius: 12px; font-size: 10px; text-align: center; color: #666; }
        .daily-day.current { border-color: var(--gold); color: #fff; background: rgba(243, 186, 47, 0.1); }

        /* Уведомления и Модалки */
        #custom-alert { position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-100px); background: #1a1a1a; border: 1px solid var(--gold); padding: 12px 25px; border-radius: 15px; z-index: 6000; transition: 0.4s; font-weight: 700; box-shadow: 0 10px 30px #000; text-align: center; pointer-events: none; }
        #custom-alert.show { transform: translateX(-50%) translateY(0); }
        #desc-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(5px); z-index: 5000; display: none; align-items: center; justify-content: center; }
        .modal-content { background: #151515; width: 75%; padding: 30px; border-radius: 25px; border: 1px solid #333; text-align: center; }

        .tap-anim { position: absolute; color: #fff; font-weight: 900; font-size: 36px; pointer-events: none; animation: float 0.8s forwards; z-index: 100; text-shadow: 0 0 15px var(--gold); }
        @keyframes float { 0% { opacity: 1; transform: translateY(0) scale(1); } 100% { opacity: 0; transform: translateY(-130px) scale(1.2); } }
    </style>
</head>
<body>

    <div id="custom-alert">Сообщение</div>
    <div id="desc-modal" onclick="this.style.display='none'">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h3 id="m-title" style="color:var(--gold)">Инфо</h3>
            <p id="m-text" style="color:#aaa; line-height:1.6;"></p>
            <button class="buy-btn" style="width:100%; margin-top:15px;" onclick="document.getElementById('desc-modal').style.display='none'">ПОНЯТНО</button>
        </div>
    </div>

    <!-- ИГРА -->
    <div id="game" class="page active">
        <div class="header">
            <div id="league-name">Бронзовая лига</div>
            <div id="balance">0</div>
            <div style="color: #666; font-size: 13px; font-weight: 700;">Прибыль: +<span id="p-inc">0</span> / сек</div>
        </div>
        <div class="coin-section">
            <div id="t-timer" class="turbo-timer">15с</div>
            <div class="coin" id="coin-btn"></div>
        </div>
        <div style="width: 85%; margin-top: auto; margin-bottom: 30px;">
            <div style="height: 10px; background: #222; border-radius: 10px; overflow: hidden; border: 1px solid #333;"><div id="e-fill" style="width: 100%; height: 100%; background: var(--gold);"></div></div>
            <div style="display:flex; justify-content: space-between; margin-top:10px; font-size:14px; font-weight:800; color:#aaa;">
                <span>⚡️ <span id="e-val">1000</span> / 1000</span>
                <span id="tap-info">Тап x1</span>
            </div>
        </div>
    </div>

    <!-- ТОП -->
    <div id="top" class="page"><h2 style="margin-top:40px;">🏆 Топ игроков</h2><div id="top-list" class="list-container"></div></div>

    <!-- МАГАЗИН -->
    <div id="shop" class="page">
        <h2 style="margin-top:40px;">🏦 Рынок</h2>
        <div class="card-list">
            <div class="card" style="background: linear-gradient(135deg, #410 0%, #111 100%); border-color:#ff4500;">
                <div class="card-info"><button class="info-btn" onclick="showInfo('turbo')">?</button>
                <div><div style="font-weight:700; color:#fff;">🔥 ТУРБО-РЕЖИМ</div><div style="color:var(--gold); font-size:12px;">Бесплатно (3/день)</div></div></div>
                <button class="buy-btn" id="turbo-start" onclick="activateTurbo()" style="background:#ff4500; color:#fff">ПУСК</button>
            </div>
            <div id="shop-items"></div>
        </div>
    </div>

    <!-- ЗАДАНИЯ -->
    <div id="tasks" class="page">
        <h2 style="margin-top:40px;">📅 Задания</h2>
        <div class="daily-grid" id="daily-rewards"></div>
        <button class="buy-btn" style="width: 90%; margin-top: 15px; padding: 15px;" onclick="claimDaily()">ЗАБРАТЬ БОНУС</button>
        <div class="card-list" style="margin-top:30px;" id="task-container">
            <div class="card" id="chan-task">
                <div class="card-info"><div><div style="font-weight:700;">Подписка на канал</div><div style="color:var(--gold);">+10,000</div></div></div>
                <button class="buy-btn" id="sub-btn" onclick="checkSub()">ПРОВЕРИТЬ</button>
            </div>
            <p id="no-tasks" style="display:none; color:#444; margin-top:20px;">Заданий пока нет...</p>
        </div>
    </div>

    <!-- ДРУЗЬЯ -->
    <div id="friends" class="page">
        <h2 style="margin-top:40px;">👥 Твоя команда</h2>
        <div style="background:#111; padding:25px; border-radius:24px; width:85%; border:1px solid #222; text-align:center;">
            <p style="color:#aaa; font-size:14px;">+10,000 за друга, +5,000 другу</p>
            <button class="buy-btn" style="width:100%; padding:15px;" onclick="copyLink()">ПРИГЛАСИТЬ</button>
        </div>
        <div id="friends-list" class="list-container"></div>
    </div>

    <div class="nav">
        <div class="nav-item active" onclick="showPage('game')"><span>🎮</span>Игра</div>
        <div class="nav-item" onclick="showPage('top')"><span>🏆</span>Топ</div>
        <div class="nav-item" onclick="showPage('shop')"><span>🏦</span>Рынок</div>
        <div class="nav-item" onclick="showPage('tasks')"><span>📅</span>Задания</div>
        <div class="nav-item" onclick="showPage('friends')"><span>👥</span>Друзья</div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        const USER_ID = tg.initDataUnsafe.user ? tg.initDataUnsafe.user.id : 123;
        
        // ВАЖНО: Проверь этот адрес!
        const API_URL = "https://nonprovincial-ireland-rubrically.ngrok-free.dev";
        const fetchOpt = { headers: { 'ngrok-skip-browser-warning': 'true', 'Content-Type': 'application/json' } };

        let state = { coins: 0, energy: 1000, tapLvl: 1, srvLvl: 0, nodeLvl: 0, aiLvl: 0, turbo: 3, isTurbo: false, last_daily: '', streak: 0, sub_done: 0 };

        const SHOP_DATA = [
            { id: 'tap', name: 'Нейрочип Клик', price: 1000, ratio: 3, desc: 'Увеличивает силу каждого твоего нажатия на монету.' },
            { id: 'srv', name: 'Облачная ферма', price: 10000, inc: 1, ratio: 2, desc: 'Позволяет добывать монеты автоматически каждую секунду.' },
            { id: 'node', name: 'Квантовый Узел', price: 150000, inc: 15, ratio: 2.2, desc: 'Профессиональная станция для мощного майнинга.' },
            { id: 'ai', name: 'Ядро Сингулярности', price: 2000000, inc: 200, ratio: 2.5, desc: 'Вершина технологий NeoTap. Максимальный пассивный доход.' }
        ];

        const LEAGUES = [
            { n: "Бронзовая", min: 0, c: "#cd7f32" },
            { n: "Серебряная", min: 50000, c: "#c0c0c0" },
            { n: "Золотая", min: 250000, c: "#f3ba2f" },
            { n: "Платиновая", min: 1000000, c: "#e5e4e2" },
            { n: "Бриллиантовая", min: 5000000, c: "#b9f2ff" }
        ];

        async function loadData() {
            try {
                let r = await fetch(`${API_URL}/get_user/${USER_ID}`, fetchOpt);
                let d = await r.json();
                if(!d.error) { Object.assign(state, d); updateUI(); }
            } catch(e) { showAlert("Ошибка сервера"); }
        }

        async function sync() {
            try { await fetch(`${API_URL}/update_user/${USER_ID}`, { method: 'POST', ...fetchOpt, body: JSON.stringify(state) }); } catch(e) {}
        }

        function updateUI() {
            document.getElementById('balance').innerText = Math.floor(state.coins).toLocaleString();
            document.getElementById('e-val').innerText = Math.floor(state.energy);
            document.getElementById('e-fill').style.width = (state.energy / 10) + '%';
            document.getElementById('p-inc').innerText = (state.srvLvl * 1 + state.nodeLvl * 15 + state.aiLvl * 200);
            document.getElementById('tap-info').innerText = 'Тап x' + (state.isTurbo ? state.tapLvl * 5 : state.tapLvl);
            
            if(state.sub_done === 1) {
                document.getElementById('chan-task').style.display = 'none';
                document.getElementById('no-tasks').style.display = 'block';
            }

            let l = [...LEAGUES].reverse().find(x => state.coins >= x.min);
            let lEl = document.getElementById('league-name');
            lEl.innerText = l.n + ' лига'; lEl.style.color = l.c;
            
            renderShop(); renderDaily();
        }

        function renderShop() {
            let h = '';
            SHOP_DATA.forEach(i => {
                let lvl = i.id === 'tap' ? state.tapLvl - 1 : state[i.id + 'Lvl'];
                let p = Math.floor(i.price * Math.pow(i.ratio, lvl));
                h += `<div class="card"><div class="card-info">
                    <button class="info-btn" onclick="showInfo('${i.id}')">?</button>
                    <div><b>${i.name}</b><div style="color:var(--gold);">💰 ${p.toLocaleString()}</div></div>
                </div><button class="buy-btn" onclick="buy('${i.id}', ${p})">КУПИТЬ</button></div>`;
            });
            document.getElementById('shop-items').innerHTML = h;
        }

        function handleTap(e) {
            let pwr = state.isTurbo ? state.tapLvl * 5 : state.tapLvl;
            if(state.energy >= state.tapLvl || state.isTurbo) {
                state.coins += pwr; if(!state.isTurbo) state.energy -= state.tapLvl;
                
                const clientX = e.type.includes('mouse') ? e.clientX : e.touches[0].clientX;
                const clientY = e.type.includes('mouse') ? e.clientY : e.touches[0].clientY;
                
                const rect = coinBtn.getBoundingClientRect();
                const rotX = (clientY - rect.top - rect.height/2)/10;
                const rotY = (clientX - rect.left - rect.width/2)/10;
                coinBtn.style.transform = `perspective(1000px) rotateX(${-rotX}deg) rotateY(${rotY}deg) scale(0.96)`;
                
                showAnim(clientX, clientY, '+' + pwr); updateUI();
                tg.HapticFeedback.impactOccurred('medium');
            }
        }

        function showAnim(x, y, t) {
            let d = document.createElement('div'); d.className = 'tap-anim'; d.innerText = t;
            d.style.left = (x - 20) + 'px'; d.style.top = (y - 40) + 'px';
            document.body.appendChild(d); setTimeout(() => d.remove(), 700);
        }

        function buy(id, p) {
            if(state.coins >= p) {
                state.coins -= p;
                if(id === 'tap') state.tapLvl++; else state[id + 'Lvl']++;
                updateUI(); sync(); showAlert("Улучшено!");
            } else showAlert("Мало монет!");
        }

        function activateTurbo() {
            if(state.turbo > 0 && !state.isTurbo) {
                state.turbo--; state.isTurbo = true;
                showPage('game'); document.body.classList.add('turbo-mode');
                let tl = 15;
                document.getElementById('t-timer').innerText = tl + 'с';
                let int = setInterval(() => {
                    tl--; document.getElementById('t-timer').innerText = tl + 'с';
                    if(tl <= 0) { clearInterval(int); state.isTurbo = false; document.body.classList.remove('turbo-mode'); showPage('shop'); updateUI(); }
                }, 1000);
            }
        }

        async function checkSub() {
            let r = await fetch(`${API_URL}/check_sub/${USER_ID}`, fetchOpt);
            let d = await r.json();
            if(d.status === 'member') {
                state.coins += 10000; state.sub_done = 1; updateUI(); sync(); showAlert("Бонус 10,000 получен!");
            } else { showAlert("Подпишись на канал!"); tg.openTelegramLink("https://t.me/NeoTapCoin"); }
        }

        function claimDaily() {
            let today = new Date().toDateString();
            if(state.last_daily !== today) {
                state.streak++; state.coins += state.streak * 1000;
                state.last_daily = today; sync(); updateUI(); showAlert("Награда за вход получена!");
            } else showAlert("Приходи завтра!");
        }

        async function showPage(p) {
            document.querySelectorAll('.page').forEach(pg => pg.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(p).classList.add('active');
            const map = {game:0, top:1, shop:2, tasks:3, friends:4};
            document.querySelectorAll('.nav-item')[map[p]].classList.add('active');
            if(p === 'top') {
                let r = await fetch(`${API_URL}/get_top`, fetchOpt);
                let top = await r.json();
                document.getElementById('top-list').innerHTML = top.map((u, i) => `<div class="card"><b>${i+1}. ${u.username}</b> <span>${Math.floor(u.coins).toLocaleString()}</span></div>`).join('');
            }
            if(p === 'friends') {
                let r = await fetch(`${API_URL}/get_friends/${USER_ID}`, fetchOpt);
                let f = await r.json();
                document.getElementById('friends-list').innerHTML = f.map(u => `<div class="card"><b>${u.username}</b> <span>${Math.floor(u.coins).toLocaleString()}</span></div>`).join('') || "<p style='text-align:center;color:#444'>Друзей нет</p>";
            }
        }

        function showInfo(id) {
            let i = id === 'turbo' ? {name:'Турбо-режим', desc:'x5 тап на 15 сек. Не тратит энергию.'} : SHOP_DATA.find(x => x.id === id);
            document.getElementById('m-title').innerText = i.name;
            document.getElementById('m-text').innerText = i.desc;
            document.getElementById('desc-modal').style.display = 'flex';
        }

        function showAlert(t) {
            let a = document.getElementById('custom-alert'); a.innerText = t; a.classList.add('show');
            setTimeout(() => a.classList.remove('show'), 2000);
        }

        function copyLink() {
            navigator.clipboard.writeText(`https://t.me/NeoTapCoin_bot?start=${USER_ID}`);
            showAlert("Ссылка скопирована!");
        }

        function renderDaily() {
            let h = '';
            for(let i=1; i<=8; i++) {
                let active = state.streak + 1 === i ? 'current' : '';
                h += `<div class="daily-day ${active}">День ${i}</div>`;
            }
            document.getElementById('daily-rewards').innerHTML = h;
        }

        // Плавная анимация
        setInterval(() => {
            state.coins += (state.srvLvl * 1 + state.nodeLvl * 15 + state.aiLvl * 200) / 100;
            if(state.energy < 1000) state.energy = Math.min(1000, state.energy + 0.01);
            updateUI();
        }, 10);

        setInterval(sync, 5000);
        const coinBtn = document.getElementById('coin-btn');
        coinBtn.addEventListener('touchstart', (e) => { e.preventDefault(); handleTap(e); });
        coinBtn.addEventListener('mousedown', handleTap);
        window.addEventListener('mouseup', () => coinBtn.style.transform = 'perspective(1000px) rotateX(0) rotateY(0) scale(1)');
        window.addEventListener('touchend', () => coinBtn.style.transform = 'perspective(1000px) rotateX(0) rotateY(0) scale(1)');
        loadData();
    </script>
</body>
</html>
